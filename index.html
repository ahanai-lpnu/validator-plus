<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Validator Plus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Display:ital,wdth@0,85;1,85&display=swap" rel="stylesheet">   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
<div id="app">
    <div class="main-wrapper">
        <div class="device-wrapper">

            <div class="screen">
                <div id="screen-container"></div>

                <div id="date-time-display" class="date-time-overlay hidden">
                    <span id="time-part"></span>
                    <span id="date-part"></span>
                </div>
                <div id="route-info-display" class="route-info-overlay hidden">
                    <span id="mean-part">ТРОЛЕЙБУС</span>
                    <span id="route-number-part">Маршрут 22</span>
                </div>
            </div>

            <div class="button-panel">
            </div>

        </div>

        <div class="bottom-area">
            <div class="drop-zone">
                <div id="drop-zone-container"></div>
            </div>

            <div id="draggable-item" class="drag-item">
                <div id="card-container"></div>
            </div>
        </div>

    </div>
</div>
<script src="script.js"></script>
</body>
</html>
